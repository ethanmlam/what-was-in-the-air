<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Was in the Air</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <div class="app-shell">
    <header class="hero surface">
      <div class="hero-copy">
        <div class="eyebrow">Apple / Epic / demo</div>
        <h1>What Was in the Air</h1>
        <p>Internal moments, made explorable.</p>
      </div>
      <div class="hero-side">
        <button id="play-toggle" class="primary-btn" type="button">Play</button>
      </div>
    </header>

    <section class="timeline surface compact-section">
      <div class="mini-head">Years</div>
      <div id="year-track" class="year-track"></div>
    </section>

    <section class="topics surface compact-section">
      <div class="mini-head">Topics</div>
      <div id="topic-filters" class="topic-grid"></div>
    </section>

    <main class="content-grid">
      <section class="panel surface">
        <div class="panel-head simple-head">
          <h3>Signals</h3>
        </div>
        <div id="topic-radar" class="topic-radar"></div>
      </section>

      <section class="panel surface panel-moments">
        <div class="panel-head simple-head">
          <h3>Moments</h3>
          <span id="result-count" class="small-pill"></span>
        </div>
        <div id="record-list" class="record-list"></div>
      </section>

      <section class="panel surface panel-detail">
        <div class="panel-head simple-head">
          <h3>Selected</h3>
        </div>
        <div id="detail-view" class="detail-view empty">
          <p>Select a moment.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
