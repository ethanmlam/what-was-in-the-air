<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Was in the Air</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="story-shell">
    <header class="top-strip">
      <div class="top-meta">Apple / Epic / internal only</div>
      <div id="progress-dots" class="progress-dots"></div>
    </header>

    <main id="slide-stage" class="slide-stage"></main>

    <footer class="nav-strip">
      <button id="prev-btn" class="nav-btn" type="button">Back</button>
      <button id="next-btn" class="nav-btn nav-btn-primary" type="button">Next</button>
    </footer>
  </div>

  <template id="archive-template">
    <div class="archive-shell">
      <div class="archive-top">
        <div>
          <div class="small-label">Archive</div>
          <h2>Moments</h2>
        </div>
        <button id="back-to-story" class="nav-btn" type="button">Back to story</button>
      </div>
      <div id="archive-records" class="archive-records"></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
